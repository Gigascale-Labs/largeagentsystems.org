name: Daily Airtable Sync

on:
  schedule:
    # Run at 06:00 UTC every day
    - cron: '0 6 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Sync from Airtable
        run: npm run sync:airtable
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: apps8rBIORsmE7ij8

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data/las-canon.airtable.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "airtable-sync[bot]"
          git config user.email "bot@largeagentsystems.org"
          git add data/las-canon.airtable.json
          git commit -m "chore: sync Canon table from Airtable

Updated at $(date -u +'%Y-%m-%dT%H:%M:%SZ')
Synced rows: $(jq 'length' data/las-canon.airtable.json)

[skip ci]"
          git push
